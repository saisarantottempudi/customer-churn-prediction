name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download dataset
        run: |
          mkdir -p data/raw data/processed models reports/figures
          curl -o data/raw/telco_churn.csv \
            https://raw.githubusercontent.com/IBM/telco-customer-churn-on-icp4d/master/data/Telco-Customer-Churn.csv

      - name: Run preprocessing pipeline
        run: python src/data_preprocessing.py

      - name: Train model
        run: python src/train_model.py

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linting tools
        run: pip install flake8
      - name: Lint with flake8
        run: |
          flake8 src/ api/ --max-line-length=120 --ignore=E501,W503,E203 --exclude=__pycache__

  api-smoke-test:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Prepare data and model
        run: |
          mkdir -p data/raw data/processed models reports/figures
          curl -o data/raw/telco_churn.csv \
            https://raw.githubusercontent.com/IBM/telco-customer-churn-on-icp4d/master/data/Telco-Customer-Churn.csv
          python src/data_preprocessing.py
          python src/train_model.py
      - name: Start API server
        run: |
          uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          sleep 8
      - name: Test health endpoint
        run: curl -f http://localhost:8000/health
      - name: Test predict endpoint
        run: |
          curl -f -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{
              "customerID": "CI-TEST-001",
              "gender": "Female",
              "SeniorCitizen": 0,
              "Partner": "Yes",
              "Dependents": "No",
              "tenure": 3,
              "PhoneService": "Yes",
              "MultipleLines": "No",
              "InternetService": "Fiber optic",
              "OnlineSecurity": "No",
              "OnlineBackup": "No",
              "DeviceProtection": "No",
              "TechSupport": "No",
              "StreamingTV": "No",
              "StreamingMovies": "No",
              "Contract": "Month-to-month",
              "PaperlessBilling": "Yes",
              "PaymentMethod": "Electronic check",
              "MonthlyCharges": 89.10,
              "TotalCharges": "267.30"
            }'
